services:
  app:
    build: .
    depends_on:
      - database
      - redis
    environment:
      DATABASE_HOST: ${DATABASE_HOST:-database}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-EstaEsUnaPasswordBuena}
      POSTGRES_DB: ${POSTGRES_DB:-puntos}
      DB_ADAPTER: ${DB_ADAPTER:-postgresql}
      RAILS_ENV: ${RAILS_ENV:-development}
      REDIS_HOST: ${REDIS_HOST:-redis}
      MAIL_DEFAULT_URL: ${MAIL_DEFAULT_URL:-localhost:3000}
      SMTP_ADDRESS: ${SMTP_ADDRESS:-smtp.gmail.com}
      SMTP_DEFAULT_FROM: ${SMTP_DEFAULT_FROM:-notificaciones@puntosaltoque.com}
      SMTP_AUTH: ${SMTP_AUTH:-login}
      SMTP_OPENSSL_VERIFY_MODE: ${SMTP_OPENSSL_VERIFY_MODE:-none}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-changeme}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SSL: ${SMTP_SSL:-false}
      SMTP_STARTTLS: ${SMTP_STARTTLS:-true}
      SMTP_TLS: ${SMTP_TLS:-false}
      SMTP_USER_NAME: ${SMTP_USER_NAME:-changeme}
      IS_LOCALHOST: ${IS_LOCALHOST:-true}
    tty: true
    networks:
      - dokploy-network
      - puntos-internal
  redis:
    image: redis
    volumes:
      - redis_data:/data
    networks:
      - puntos-internal
  database:
    image: postgres:16.1
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-EstaEsUnaPasswordBuena}
      POSTGRES_DB: ${POSTGRES_DB:-puntos}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - puntos-internal
  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@localhost.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_LISTEN_PORT: ${PGADMIN_LISTEN_PORT:-80}
    depends_on:
      - database
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    networks:
      - puntos-internal
      
networks:
  dokploy-network:
    external: true
  puntos-internal:

volumes:
  db_data:
  redis_data:
  storage_data:
  gems_volume:
  pgadmin-data: