services:
  app:
    build: .
    depends_on:
      - database
      - redis
    volumes:
      - .:/app
      - storage_data:/var/www/app_storage
      - gems_volume:/gems:cached
    env_file:
      - .env
    #ports:
    #  - 3000:3000
    tty: true
    networks:
      - puntos-internal

  redis:
    image: redis
    #ports:
    #  - 6378:6379
    volumes:
      - redis_data:/data
    networks:
      - puntos-internal

  database:
    image: postgres:16.1
    env_file:
      - .env
    #ports:
    #  - 5432:5432
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - puntos-internal

  pgadmin:
    image: dpage/pgadmin4:latest
    env_file:
      - .env
    depends_on:
      - database
    #ports:
    #  - 7000:80
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    networks:
      - puntos-internal

networks:
  dokploy-network:
    external: true
  puntos-internal:

volumes:
  db_data:
  redis_data:
  storage_data:
  gems_volume:
  pgadmin-data:
